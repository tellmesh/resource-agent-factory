version: '1.0'
project:
  name: resource-agent-factory
  type: [python]
  description: 'resource-agent-factory — TellMesh core package'
versioning:
  strategy: semver
  files: [pyproject.toml:version]
git:
  commit:
    strategy: conventional
    scope: resource-agent-factory
  tag:
    enabled: true
    prefix: v
strategies:
  python:
    test: pytest tests/ -q
    build: python -m build
    publish: twine upload dist/resource-agent-factory-{version}*
    publish_enabled: true
registries:
  pypi:
    url: https://pypi.org/simple/
    token_env: PYPI_TOKEN
